            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .niche-toggle {
            display: flex;
            gap: 8px;
            flex: 1;
            min-width: 240px;
        }

        .toggle-btn {
            flex: 1;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 700;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: #666;
        }

        .toggle-btn:active {
            transform: scale(0.98);
        }

        .toggle-btn.active {
            background: #E8956B;
            color: white;
            border-color: #E8956B;
        }

        .toggle-btn.business {
            color: #666;
        }

        .toggle-btn.business.active {
            background: #9BA89A;
            border-color: #9BA89A;
        }

        .shuffle-btn {
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 700;
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 50px;
            text-align: center;
        }

        .shuffle-btn:active {
            transform: scale(0.95);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .get-today-btn {
            flex: 1;
            padding: 14px 16px;
            font-size: 15px;
            font-weight: 700;
            background: linear-gradient(135deg, #E8956B 0%, #d97d4a 100%);

            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(232, 149, 107, 0.3);
        }

            background: linear-gradient(135deg, #9BA89A 0%, #7d8d7f 100%);
            box-shadow: 0 4px 12px rgba(155, 168, 154, 0.3);
        }

        .get-today-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .day-selector {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding: 4px 0;
            scroll-behavior: smooth;
        }

        .day-selector::-webkit-scrollbar {
            height: 4px;
        }

        .day-selector::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 2px;
        }

        .day-selector::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 2px;
        }

        .day-num {
            min-width: 42px;
            height: 42px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .day-num:active {
            transform: scale(0.92);
        }

        .day-num.active {
            background: #E8956B;
            color: white;
            border-color: #E8956B;
        }

        .day-num.active.business {
            background: #9BA89A;
            border-color: #9BA89A;
        }

            content: "✓";
            position: absolute;
            top: -8px;
            right: -8px;
            background: #4caf50;
            color: white;

            height: 20px;
            border-radius: 50%;

            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;

        let currentDay = 1;

        function loadShuffledOrder() {
            const stored = localStorage.getItem(`dayOrder_${currentNiche}`);
            if (stored) {
                dayOrder = JSON.parse(stored);
            } else {
                dayOrder = Array.from({ length: 15 }, (_, i) => i + 1);
            }
        }

        function saveShuffledOrder() {
            localStorage.setItem(`dayOrder_${currentNiche}`, JSON.stringify(dayOrder));
        }

        function getContentByDisplayDay(displayDay) {
            const actualDay = dayOrder[displayDay - 1];
            return contentData[actualDay - 1];
        }

        function shuffleContent() {
            // Fisher-Yates shuffle
            const array = [...dayOrder];
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            dayOrder = array;
            saveShuffledOrder();
            displayContent(1);
        }

        function getPlatformClass(platform) {
            const name = platform.toLowerCase();
            if (name.includes("instagram")) return "instagram";
            if (name.includes("tiktok") || name.includes("reels")) return "tiktok";
            if (name.includes("facebook")) return "facebook";
            if (name.includes("threads")) return "threads";
            if (name.includes("pinterest")) return "pinterest";
            return "";
        }

        function updateToggleButtons() {
            const momBtn = document.querySelector('.toggle-btn:not(.business)');
            const bizBtn = document.querySelector('.toggle-btn.business');
            
            if (currentNiche === 'mom') {
                momBtn.classList.add('active');
                bizBtn.classList.remove('active');
                document.querySelector('.get-today-btn').classList.remove('business');
            } else {
                momBtn.classList.remove('active');
                bizBtn.classList.add('active');
                document.querySelector('.get-today-btn').classList.add('business');
            }
        }

        function getTodayDay() {
            const today = new Date();
            const dayOfMonth = today.getDate();
            return ((dayOfMonth - 1) % 15) + 1;
        }

        function getCheckboxKey(displayDay) {
            return `checked_${currentNiche}_${displayDay}`;
        }

        function isChecked(displayDay) {
            return localStorage.getItem(getCheckboxKey(displayDay)) === 'true';
        }

        function toggleCheck(displayDay) {
            const key = getCheckboxKey(displayDay);
            const checked = isChecked(displayDay);
            localStorage.setItem(key, String(!checked));
            displayContent(displayDay);
        }

        function displayContent(displayDay) {
            currentDay = displayDay;
            const content = getContentByDisplayDay(displayDay);
            if (!content) return;

            const nicheContent = content.niches[currentNiche];
            const platformClass = getPlatformClass(nicheContent.platform);
            const isCtaEmpty = nicheContent.cta.text === "None";
            const checked = isChecked(displayDay);
            const nicheClass = currentNiche === 'mom' ? '' : 'business';

            let ctaHtml = '';
            if (isCtaEmpty) {
                ctaHtml = `<div class="cta-button ${nicheClass} empty">${nicheContent.cta.text}</div>`;
            } else if (nicheContent.cta.url) {
                ctaHtml = `<a href="${nicheContent.cta.url}" target="_blank" class="cta-button ${nicheClass}">${nicheContent.cta.text}</a>`;
            } else {
                ctaHtml = `<div class="cta-button ${nicheClass}">${nicheContent.cta.text}</div>`;
            }

            const html = `
                <div class="content-card ${nicheClass}">
                    <div class="card-top">
                        <div>
                            <div class="day-label">Day ${content.day}</div>
                            <div class="niche-label">${currentNiche === 'mom' ? '👩‍👧 Mom Content' : '💼 Business Content'}</div>
                        </div>
                        <div class="checkbox-container">
                            <input type="checkbox" class="day-checkbox" ${checked ? 'checked' : ''} onchange="toggleCheck(${displayDay})">
                        </div>
                    </div>
                    <div>
                        <span class="platform-badge ${platformClass}">${nicheContent.platform}</span>
                        <span class="goal-badge ${nicheContent.goal.toLowerCase()}">${nicheContent.goal}</span>
                    </div>
                    <div class="topic">${nicheContent.topic}</div>
                    <div class="hook">"${nicheContent.hook}"</div>
                    <div class="content-body">${nicheContent.body}</div>
                    <div class="format-type">📱 ${nicheContent.format}</div>
                    ${ctaHtml}
                    <div class="time">⏰ ${nicheContent.time}</div>
                </div>
            `;

            document.getElementById("contentDisplay").innerHTML = html;
            updateDaySelector();
        }

        function updateDaySelector() {
            let html = "";
            for (let i = 1; i <= 15; i++) {
                const isActive = i === currentDay ? "active" : "";
                const isToday = i === getTodayDay() ? "today" : "";
                const checked = isChecked(i) ? "checked" : "";
                const nicheClass = currentNiche === 'mom' ? '' : 'business';
                html += `<div class="day-num ${isActive} ${isToday} ${checked} ${nicheClass}" onclick="displayContent(${i})">${i}</div>`;
            }
            document.getElementById("daySelector").innerHTML = html;
            
            const selector = document.getElementById("daySelector");
            const activeBtn = selector.querySelector(".day-num.active");
            if (activeBtn) {
                setTimeout(() => {
                    activeBtn.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
                }, 100);
            }
        }

        function goToToday() {
            const today = getTodayDay();
            displayContent(today);
        }

        function updateDateDisplay() {
            const today = new Date();
            const options = { weekday: "short", month: "short", day: "numeric" };
            const dateStr = today.toLocaleDateString("en-US", options);
            document.getElementById("dateDisplay").textContent = `Today: ${dateStr}`;
        }

        // Initialize
        loadShuffledOrder();
        updateToggleButtons();
        updateDateDisplay();
        goToToday();
    </script>
</body>
</html>
