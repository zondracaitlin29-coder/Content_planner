        function getCurrentDay() {
            if (!localStorage.getItem("zondra_startDate")) {
                const today = new Date();
                localStorage.setItem("zondra_startDate", today.toISOString().split("T")[0]);
            }

            const startDate = new Date(localStorage.getItem("zondra_startDate"));
            const today = new Date();
            const diffTime = today - startDate;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
            return Math.min(Math.max(diffDays, 1), 30);
        }

        function triggerConfetti() {
            const canvas = document.createElement("canvas");
            canvas.style.position = "fixed";
            canvas.style.top = "0";
            canvas.style.left = "0";
            canvas.style.width = "100%";
            canvas.style.height = "100%";
            canvas.style.pointerEvents = "none";
            canvas.style.zIndex = "9999";
            document.body.appendChild(canvas);

            const ctx = canvas.getContext("2d");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ["#E67E22", "#3498DB", "#9B59B6", "#27AE60", "#E74C3C"];

            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12 - 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1,
                    size: Math.random() * 8 + 4
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let allDone = true;

                for (let p of particles) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.2;
                    p.life -= 0.02;

                    if (p.life > 0) {
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = p.life;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        allDone = false;
                    }
                }

                ctx.globalAlpha = 1;
                if (!allDone) {
                    requestAnimationFrame(animate);
                } else {
                    canvas.remove();
                }
            }

            animate();
        }

                weeklyTasksHtml += "</div>";
            }

            let content = "<div class=\"content-card\" style=\"border-left-color: " + goalColor + ";\"><div class=\"card-platform\">" + (platformEmoji[platform] || "📱") + " " + platform + "</div><div class=\"badges\"><span class=\"badge\">" + (currentNiche === "mom" ? "Feeding" : currentNiche === "building" ? "Building" : "DMs") + "</span><span class=\"badge\" style=\"background-color: " + goalColor + "; color: white;\">" + plan.goal + "</span></div><div class=\"posted-checkbox\"><input type=\"checkbox\" id=\"taskPost\" onchange=\"updateProgress()\"><label for=\"taskPost\">Content Posted</label></div><div class=\"content-section\"><div class=\"section-label\">🎯 Hook Coaching — " + coachingData.pattern + " Pattern</div><div style=\"font-size: 13px; color: #333; line-height: 1.6; margin-bottom: 12px;\">Your hook should:<br>" + coachingData.guidance + "</div>" + examplesHtml + "</div><div class=\"content-section\"><div class=\"section-label\">Topic</div><div class=\"section-content\">" + plan.topic + "</div></div><div class=\"content-section\"><div class=\"section-label\">Guidelines</div>" + guidelinesHtml + hashtagDisplay + "</div><div class=\"times-section\">Best Time: " + postingTime + " SAST</div><div class=\"content-section\"><div class=\"section-label\">Format</div><div class=\"section-content\">" + plan.format + "</div></div></div>" + weeklyTasksHtml;

            document.getElementById("contentDisplay").innerHTML = content;
            renderDayNav();
            updateProgress();
            restoreTaskProgress();

            // Add event listeners for weekly task checkboxes with progress tracking and confetti
            const checkboxes = document.querySelectorAll(".weekly-task input[type='checkbox']");
            checkboxes.forEach(checkbox => {
                checkbox.addEventListener("change", function() {
                    const day = this.getAttribute("data-day");
                    const cat = this.getAttribute("data-cat");
                    const task = this.getAttribute("data-task");
                    const storageKey = "weekly_" + day + "_" + cat + "_" + task;
                    
                    if (this.checked) {
                        localStorage.setItem(storageKey, "true");
                    } else {
                        localStorage.removeItem(storageKey);
                    }

                    // Update progress counters for this category
                    const categoryLabel = this.closest(".weekly-category").querySelector(".weekly-category-label");
                    const allCheckboxesInCategory = this.closest(".weekly-category").querySelectorAll("input[type='checkbox']");
                    const checkedCount = Array.from(allCheckboxesInCategory).filter(cb => cb.checked).length;
                    const totalCount = allCheckboxesInCategory.length;
                    
                    const progressSpan = categoryLabel.querySelector(".weekly-category-progress");
                    if (progressSpan) {
                        progressSpan.textContent = checkedCount + " of " + totalCount;
                    }

                    // Check if all tasks for the day are complete
                    const allCheckboxesForDay = document.querySelectorAll("input[data-day='" + day + "']");
                    const allChecked = Array.from(allCheckboxesForDay).every(cb => cb.checked);
                    
                    if (allChecked) {
                        triggerConfetti();
                    }
                });
            });
        }

        function updateProgress() {
            const percent = Math.round((currentDay / 30) * 100);
            document.getElementById("mainProgress").style.width = percent + "%";
            checkDayCompletion();
        }

        function checkDayCompletion() {
            const taskPost = document.getElementById("taskPost");
            if (taskPost && taskPost.checked && currentDay < 30) {
                setTimeout(() => {
                    currentDay += 1;
                    renderDay(currentDay);
                    updateMotivation();
                }, 500);
            }
        }

        function restoreTaskProgress() {
            setTimeout(() => {
                const taskPost = document.getElementById("taskPost");
                const saved = localStorage.getItem("day_" + currentDay);
                if (taskPost && saved === "1") taskPost.checked = true;

                // Restore weekly task checkboxes
                const weeklyCheckboxes = document.querySelectorAll(".weekly-task input[type='checkbox']");
                weeklyCheckboxes.forEach(checkbox => {
                    const day = checkbox.getAttribute("data-day");
                    const cat = checkbox.getAttribute("data-cat");
                    const task = checkbox.getAttribute("data-task");
                    const storageKey = "weekly_" + day + "_" + cat + "_" + task;
                    
                    if (localStorage.getItem(storageKey) === "true") {
                        checkbox.checked = true;
                    }

                    // Update progress counter after restoring
                    const categoryLabel = checkbox.closest(".weekly-category").querySelector(".weekly-category-label");
                    const allCheckboxesInCategory = checkbox.closest(".weekly-category").querySelectorAll("input[type='checkbox']");
                    const checkedCount = Array.from(allCheckboxesInCategory).filter(cb => cb.checked).length;
                    const totalCount = allCheckboxesInCategory.length;
                    
                    const progressSpan = categoryLabel.querySelector(".weekly-category-progress");
                    if (progressSpan) {
                        progressSpan.textContent = checkedCount + " of " + totalCount;
                    }
                });
            }, 0);
        }

        document.addEventListener("change", function(e) {
            if (e.target.id === "taskPost") {
                localStorage.setItem("day_" + currentDay, e.target.checked ? "1" : "0");
                checkDayCompletion();
            }
        });

        function registerServiceWorker() {
            if ("serviceWorker" in navigator) {
                const sw = "self.addEventListener('install', e => { e.waitUntil(caches.open('30d-v2').then(c => c.addAll(['/']))); self.skipWaiting(); }); self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(names => Promise.all(names.map(n => n !== '30d-v2' ? caches.delete(n) : null)))); self.clients.claim(); }); self.addEventListener('fetch', e => { e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(r => caches.open('30d-v2').then(c => { c.put(e.request, r.clone()); return r; })))); });";
                const blob = new Blob([sw], { type: "application/javascript" });
                const url = URL.createObjectURL(blob);
                navigator.serviceWorker.register(url).catch(() => {});
            }
        }

        initApp();
    </script>
</body>
</html>
