        function getDayInfo(dayNum) {
            const currentDate = new Date(startDate);
            currentDate.setDate(currentDate.getDate() + (dayNum - 1));
            
            const dayOfWeek = currentDate.toLocaleDateString('en-ZA', { weekday: 'long' });
            const dateString = currentDate.toLocaleDateString('en-ZA', { year: 'numeric', month: 'long', day: 'numeric' });
            
            return { dayOfWeek, dateString };
        }

        function getPostingTime(dayOfWeek, platform) {
            return postingSchedule[dayOfWeek]?.[platform] || '12:00 PM';
        }

        function getRecommendedNiche(dayOfWeek) {
            return dayContentMap[dayOfWeek];
        }

        function getWeeklyTasks(dayOfWeek) {
            return weeklyStrategy[dayOfWeek] || null;
        }

        function setNiche(niche) {
            currentNiche = niche;
            document.querySelectorAll('.niche-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            localStorage.setItem('zondra_niche', niche);
            renderDayNav();
            renderDay(currentDay);
        }

        function initApp() {
            const savedNiche = localStorage.getItem('zondra_niche') || 'mom';
            const savedDay = localStorage.getItem('zondra_day') || '1';
            const lastDate = localStorage.getItem('zondra_lastDate');
            const today = new Date().toDateString();

            currentNiche = savedNiche;
            currentDay = parseInt(savedDay);

            if (lastDate && lastDate !== today && currentDay < 30) {
                currentDay += 1;
            }

            localStorage.setItem('zondra_lastDate', today);
            localStorage.setItem('zondra_day', currentDay.toString());

            document.querySelectorAll('.niche-btn').forEach((btn, idx) => {
                btn.classList.remove('active', 'recommended');
                if ((idx === 0 && savedNiche === 'mom') || 
                    (idx === 1 && savedNiche === 'building') || 
                    (idx === 2 && savedNiche === 'inbox')) {
                    btn.classList.add('active');
                }
            });

            renderDayNav();
            renderDay(currentDay);
            restoreTaskProgress();
            registerServiceWorker();
        }

        function renderDayNav() {
            const nav = document.getElementById('dayNav');
            nav.innerHTML = '';
            for (let i = 1; i <= 30; i++) {
                const btn = document.createElement('button');
                btn.className = 'day-quick';
                if (i === currentDay) btn.classList.add('active');
                
                const dayComplete = isDayComplete(i);
                if (dayComplete) {
                    btn.classList.add('completed');
                    btn.disabled = true;
                }
                
                btn.innerText = i;
                btn.onclick = () => {
                    if (!dayComplete || i === currentDay) {
                        currentDay = i;
                        renderDayNav();
                        renderDay(i);
                        updateProgress();
                        restoreTaskProgress();
                    }
                };
                nav.appendChild(btn);
            }
        }

        function renderDay(dayNum) {
            const { dayOfWeek, dateString } = getDayInfo(dayNum);
            const plan = contentData[currentNiche][dayNum - 1];
            const platform = platformSchedule[currentNiche][dayNum - 1];
            const postingTime = getPostingTime(dayOfWeek, platform);
            const recommended = getRecommendedNiche(dayOfWeek);
            const weeklyTasks = getWeeklyTasks(dayOfWeek);
            const hookArray = currentNiche === 'mom' ? momHooks : (currentNiche === 'building' ? buildingHooks : inboxHooks);
            const hook = hookArray[dayNum % hookArray.length];

            const display = document.getElementById('contentDisplay');

            document.getElementById('dateDisplay').innerText = `${dayOfWeek}, ${dateString}`;

            document.querySelectorAll('.niche-btn').forEach((btn, idx) => {
                btn.classList.remove('recommended');
                const btnNiche = idx === 0 ? 'mom' : (idx === 1 ? 'building' : 'inbox');
                if (recommended && recommended.niche === btnNiche) {
                    btn.classList.add('recommended');
                }
            });

            let goalBadgeClass = plan.goal === 'Promotional' ? 'badge-goal' : 'badge-engagement';
            if (plan.goal === 'Educational' || plan.goal === 'Practical' || plan.goal === 'Safety' || plan.goal === 'Inspiration') {
                goalBadgeClass = 'badge-engagement';
            }
            
            let guidelinesHtml = '<div class="guidelines-box">';
            if (plan.guidelines) {
                plan.guidelines.forEach((guideline) => {
                    guidelinesHtml += `<div class="guideline-item">${guideline}</div>`;
                });
            }
            guidelinesHtml += '</div>';

            let hashtagDisplay = plan.hashtags ? `<div class="guideline-item">📍 Hashtags: ${plan.hashtags}</div>` : '';

            let weeklyTasksHtml = '';
            if (weeklyTasks) {
                weeklyTasksHtml = '<div class="task-card"><h3>📅 Weekly Strategy: ' + dayOfWeek + '</h3>';
                Object.keys(weeklyTasks).forEach((category) => {
                    weeklyTasksHtml += `<div class="task-category">
                        <div class="task-category-label">${category}</div>`;
                    weeklyTasks[category].forEach((task) => {
                        weeklyTasksHtml += `<div class="task-item">
                            <input type="checkbox" class="weekly-task" data-day="${dayNum}" data-category="${category}" data-task="${task}">
                            <label>${task}</label>
                        </div>`;
                    });
                    weeklyTasksHtml += '</div>';
                });
                weeklyTasksHtml += '</div>';
            }

            let content = `
                <div class="content-card">
                    <div class="card-platform">${platformSchedule[currentNiche][dayNum - 1] ? platformEmoji[platform] || '📱' : '📱'} ${platform}</div>

                    <div class="badges">
                        <span class="badge badge-niche">${currentNiche === 'mom' ? 'Feeding' : currentNiche === 'building' ? 'Building' : 'DMs'}</span>
                        <span class="badge ${goalBadgeClass}">${plan.goal}</span>
                        ${recommended ? `<span class="badge badge-content-type">📋 ${recommended.contentType}</span>` : ''}
                    </div>

                    <div class="posted-checkbox">
                        <input type="checkbox" id="taskPost" onchange="updateProgress()">
                        <label for="taskPost">Content Posted</label>
                    </div>

                    <div class="content-section">
                        <div class="section-label">💡 Hook</div>
                        <div class="hook">"${hook}"</div>
                    </div>

                    <div class="content-section">
                        <div class="section-label">📝 Topic</div>
                        <div class="section-content">${plan.topic}</div>
                    </div>

                    <div class="content-section">
                        <div class="section-label">📋 Post Guidelines</div>
                        ${guidelinesHtml}
                        ${hashtagDisplay}
                    </div>

                    <div class="times-section">⏰ Best Time: ${postingTime} SAST</div>

                    <div class="content-section">
                        <div class="section-label">📎 Format</div>
                        <div class="section-content">${plan.format}</div>
                    </div>
                </div>

                ${weeklyTasksHtml}
            `;
            
            display.innerHTML = content;
            document.getElementById('dayNumber').innerText = dayNum;
            updateProgress();
            restoreTaskProgress();
        }

        function updateProgress() {
            const percent = Math.round((currentDay / 30) * 100);
            document.getElementById('mainProgress').style.width = percent + '%';
            checkDayCompletion();
        }

        function getAllDayTasks(dayNum) {
            const { dayOfWeek } = getDayInfo(dayNum);
            const weeklyTasks = getWeeklyTasks(dayOfWeek);
            
            let allTasks = [];

            // Content posted task
            allTasks.push({
                key: `zondra_day${dayNum}_taskPost`,
                type: 'content'
            });

            // Weekly strategy tasks (if any)
            if (weeklyTasks) {
                Object.keys(weeklyTasks).forEach((category) => {
                    weeklyTasks[category].forEach((task) => {
                        allTasks.push({
                            key: `weekly_${dayNum}_${category}_${task}`,
                            type: 'strategy'
                        });
                    });
                });
            }

            return allTasks;
        }

        function isDayComplete(dayNum) {
            const allTasks = getAllDayTasks(dayNum);
            
            if (allTasks.length === 0) return false;

            return allTasks.every(task => {
                return localStorage.getItem(task.key) === 'true';
            });
        }

        function checkDayCompletion() {
            renderDayNav();
            
            // Check if current day is complete
            if (isDayComplete(currentDay) && currentDay < 30) {
                // Auto-advance to next day after a brief delay
                setTimeout(() => {
                    currentDay += 1;
                    localStorage.setItem('zondra_day', currentDay.toString());
                    renderDayNav();
                    renderDay(currentDay);
                    document.querySelector('.container').scrollTop = 0;
                }, 500);
            }
        }

        function goToToday() {
            currentDay = parseInt(localStorage.getItem('zondra_day') || '1');
            renderDayNav();
            renderDay(currentDay);
            document.querySelector('.container').scrollTop = 0;
        }

        function shuffleDay() {
            let incompleteDays = [];
            for (let i = currentDay; i <= 30; i++) {
                if (!isDayComplete(i)) {
                    incompleteDays.push(i);
                }
            }
            
            if (incompleteDays.length > 0) {
                const randomIndex = Math.floor(Math.random() * incompleteDays.length);
                currentDay = incompleteDays[randomIndex];
                renderDayNav();
                renderDay(currentDay);
                document.querySelector('.container').scrollTop = 0;
            }
        }

        function restoreTaskProgress() {
            setTimeout(() => {
                const taskPost = document.getElementById('taskPost');
                const postDone = localStorage.getItem(`zondra_day${currentDay}_taskPost`);
                if (taskPost) taskPost.checked = postDone === 'true';

                document.querySelectorAll('.weekly-task').forEach((checkbox) => {
                    const key = `weekly_${checkbox.dataset.day}_${checkbox.dataset.category}_${checkbox.dataset.task}`;
                    checkbox.checked = localStorage.getItem(key) === 'true';
                });
            }, 0);
        }

        document.addEventListener('change', function(e) {
            if (e.target.id === 'taskPost') {
                localStorage.setItem(`zondra_day${currentDay}_taskPost`, e.target.checked);
                checkDayCompletion();
            }
            if (e.target.classList.contains('weekly-task')) {
                const key = `weekly_${e.target.dataset.day}_${e.target.dataset.category}_${e.target.dataset.task}`;
                localStorage.setItem(key, e.target.checked);
            }
        });

        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                const swCode = `
                    self.addEventListener('install', event => {
                        event.waitUntil(caches.open('30-day-creator-v1').then(cache => {
                            return cache.addAll(['/']);
                        }));
                        self.skipWaiting();
                    });

                    self.addEventListener('activate', event => {
                        event.waitUntil(caches.keys().then(cacheNames => {
                            return Promise.all(cacheNames.map(cacheName => {
                                if (cacheName !== '30-day-creator-v1') {
                                    return caches.delete(cacheName);
                                }
                            }));
                        }));
                        self.clients.claim();
                    });

                    self.addEventListener('fetch', event => {
                        event.respondWith(caches.match(event.request).then(response => {
                            return response || fetch(event.request).then(response => {
                                return caches.open('30-day-creator-v1').then(cache => {
                                    cache.put(event.request, response.clone());
                                    return response;
                                });
                            });
                        }));
                    });
                `;

                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(() => {});
            }
        }

        initApp();
    </script>
